# ===== 테스트 전용 설정 =====
# 이 파일은 테스트 클래스패스에만 존재하며 운영 설정(src/main/resources/application.properties)을
# 덮어쓴다. @SpringBootTest(DemoApplicationTests) 가 MySQL/Redis 없이 컨텍스트를 띄우기 위한 것이다.
#
# 배경: 운영 schema.sql 은 MySQL 전용 문법(BIGINT UNSIGNED, COMMENT, ENGINE=InnoDB)이라
# 임베디드 H2 에서 실행되지 않는다. 테스트에서는 스크립트 초기화를 끄고 엔티티로부터
# 스키마를 생성한다. (스키마-엔티티 정합성 검증은 실제 MySQL 통합 테스트의 몫이다)

spring.datasource.url=jdbc:h2:mem:ongi;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# schema.sql / data.sql 실행 금지 (MySQL 전용 문법)
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=false
spring.jpa.show-sql=false

# 세션 저장소를 Redis 대신 인메모리로 (테스트에 Redis 컨테이너 불필요)
spring.session.store-type=none
spring.data.redis.repositories.enabled=false
spring.autoconfigure.exclude=\
  org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration,\
  org.springframework.boot.data.redis.autoconfigure.RedisReactiveAutoConfiguration,\
  org.springframework.boot.session.data.redis.autoconfigure.RedisSessionAutoConfiguration

# OpenAI 는 테스트에서 호출하지 않지만 키 검증 경로를 피하기 위해 더미 값을 둔다
openai.api-key=test-key

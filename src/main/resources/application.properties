spring.application.name=ongi

# ===== JPA / Hibernate (해커톤 개발용) =====
# none: 스키마는 전적으로 schema.sql 이 소유한다. 엔티티는 테이블 구조와 정확히 일치.
# (validate 는 defer-datasource-initialization 때문에 테이블 생성 전 검증되어 실패하므로 사용 금지)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 지연 로딩 관련 경고 제거
spring.jpa.open-in-view=false
# schema.sql/data.sql 이 Hibernate DDL 이후 실행되도록 보장
spring.jpa.defer-datasource-initialization=true

# ===== SQL 스크립트 초기화 (schema.sql -> data.sql) =====
# always: 앱 시작 시마다 두 스크립트를 순서대로 실행하지만, 스크립트가 멱등하게
#         작성되어 있어 "처음에만" 테이블/시드가 만들어지고 재부팅 시 데이터는 유지된다.
#   - schema.sql : CREATE TABLE IF NOT EXISTS  (있으면 그대로 둠)
#   - data.sql   : INSERT IGNORE               (이미 있으면 무시 -> 데이터 보존)
# 로컬 테스트 데이터를 전부 초기화하려면 schema.sql 상단의 RESET 블록 주석을
# 잠깐 해제한 뒤 재시작하면 된다. (별도 설정 변경 불필요)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
# 스크립트 파일을 UTF-8 로 읽도록 명시(한글 깨짐/이중 인코딩 방지)
spring.sql.init.encoding=UTF-8
# 스크립트 오류 시 즉시 중단(문제를 조용히 넘기지 않음)
spring.sql.init.continue-on-error=false

# ===== OpenAI =====
# API 키는 환경변수 OPENAI_API_KEY 로만 주입한다 (예: export OPENAI_API_KEY=sk-...).
# 미설정 시 문서 판독/챗봇 호출 때 500(친절한 메시지)로 실패하고, 나머지 API 는 정상 동작한다.
openai.api-key=${OPENAI_API_KEY:}
openai.base-url=https://api.openai.com/v1
openai.model=gpt-4o

# ===== 파일 업로드 (진단서/처방전 이미지) =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Swagger / springdoc =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha
